name: Build APK and upload to Appetize

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          accept-android-sdk-licenses: true
          packages: |
            platform-tools
            build-tools;27.0.3
            platforms;android-26

      - name: Set up JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload to Appetize (optional)
        env:
          APPETIZE_API_KEY: ${{ secrets.APPETIZE_API_KEY }}
        run: |
          set -e
          if [ -z "${APPETIZE_API_KEY}" ]; then
            echo "Appetize API key not set. Skipping upload."
            exit 0
          fi
          APK=app/build/outputs/apk/debug/app-debug.apk
          echo "Uploading $APK to Appetize..."
          RESPONSE=$(curl -s -X POST -F "file=@${APK}" -F "platform=android" -F "apiKey=${APPETIZE_API_KEY}" https://api.appetize.io/v1/apps)
          echo "Appetize response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys, json; r=json.load(sys.stdin); print(r.get('publicURL') or r.get('embed') or r)"
